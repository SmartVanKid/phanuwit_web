    <table border="1" cellpadding="10" style="
        margin:auto;
        font-size:20px;

            <th>วัน</th>

        </tr>

        <tr>
            <td>จันทร์</td>
            <td>นอน / ทำการบ้าน / เล่นเกม</td>

            <td>ศุกร์</td>

        </tr>

        <tr>
            <td>เสาร์</td>
            <td>นอน / ดูหนัง / เล่นเกม</td>
        </tr>

        <tr>
            <td>อาทิตย์</td>
