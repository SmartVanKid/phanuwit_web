<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าที่ 2 - ทักษะและอาชีพ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&family=Mitr:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #0d0203;
            background-image: radial-gradient(circle at 50% 20%, #3a0007 0%, #0d0203 80%);
            color: #ffffff;
            font-family: 'Kanit', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: rgba(20, 5, 7, 0.85);
            border: 2px solid #ff1e43;
            box-shadow: 0 0 25px rgba(255, 30, 67, 0.3);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(5px);
        }

        /* เมนูนำทางด้านบนตรงกลาง */
        .navbar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: rgba(40, 10, 15, 0.8);
            color: #ff8093;
            border: 1px solid #ff1e43;
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-family: 'Mitr', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: #ff1e43;
            color: #ffffff;
            box-shadow: 0 0 12px rgba(255, 30, 67, 0.8);
            transform: translateY(-2px);
        }

        .nav-btn.active {
            background: linear-gradient(45deg, #b3001b, #ff1e43);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 30, 67, 0.8);
            font-weight: bold;
        }

        h1 {
            font-family: 'Mitr', sans-serif;
            color: #ff2a4b;
            text-align: center;
            font-size: 2rem;
            text-shadow: 0 0 10px #ff002b, 0 0 20px #ff002b;
            margin-bottom: 25px;
        }

        hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff1e43, transparent);
            margin: 25px 0;
        }

        .content-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            background: rgba(40, 10, 15, 0.6);
            border: 1px solid rgba(255, 30, 67, 0.4);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .content-box img {
            width: 100%;
            max-width: 280px;
            border-radius: 10px;
            border: 2px solid #ff1e43;
            box-shadow: 0 0 15px rgba(255, 0, 43, 0.4);
        }

        .content-box ul, .content-box ol {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #f0f0f0;
        }

        .btn-next {
            background: linear-gradient(45deg, #b3001b, #ff1e43);
            color: white;
            padding: 12px 35px;
            font-size: 18px;
            font-family: 'Mitr', sans-serif;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 30, 67, 0.6);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-next:hover {
            background: linear-gradient(45deg, #ff1e43, #ff5572);
            box-shadow: 0 0 25px rgba(255, 30, 67, 1);
            transform: translateY(-3px) scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- แถบเมนูตรงกลาง -->
        <div class="navbar">
            <a href="index.html" class="nav-btn">หน้าแรก (แนะนำตัว)</a>
            <a href="page2.html" class="nav-btn active">หน้า 2 (ทักษะและอาชีพ)</a>
            <a href="page3.html" class="nav-btn">หน้า 3 (ตารางกิจวัตรประจำวัน)</a>
        </div>

        <h1>รายการทักษะที่ต้องการพัฒนา</h1>
        <div class="content-box">
            <img src="programmer.jpg" alt="ทักษะ">
            <ul>
                <li>ใช้คอมพิวเตอร์ให้คล่อง</li>
                <li>เขียนเว็บไซต์</li>
                <li>ตัดต่อวิดีโอ</li>
                <li>พูดภาษาอังกฤษ</li>
            </ul>
        </div>

        <hr>

        <h1>ลำดับอาชีพที่อยากทำ</h1>
        <div class="content-box">
            <img src="computer.jpg" alt="อาชีพ">
            <ol>
                <li>โปรแกรมเมอร์</li>
                <li>เกมเมอร์สุดโหด</li>
                <li>นักพัฒนาเกม</li>
            </ol>
        </div>

        <br>
        <div style="text-align: center;">
            <a href="page3.html" style="text-decoration: none;">
                <button class="btn-next">ถัดไป ➔</button>
            </a>
        </div>
    </div>

</body>
</html>
