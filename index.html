<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แนะนำตัวเอง</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&family=Mitr:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #0d0203;
            background-image: radial-gradient(circle at 50% 20%, #3a0007 0%, #0d0203 80%);
            color: #ffffff;
            font-family: 'Kanit', sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* 1. Cursor Effect แสงนีออนตามเมาส์ */
        .cursor-glow {
            width: 25px;
            height: 25px;
            background: rgba(255, 30, 67, 0.6);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            box-shadow: 0 0 15px #ff1e43, 0 0 30px #ff1e43;
            transform: translate(-50%, -50%);
            transition: transform 0.08s ease-out;
            z-index: 9999;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: rgba(20, 5, 7, 0.85);
            border: 2px solid #ff1e43;
            box-shadow: 0 0 25px rgba(255, 30, 67, 0.3);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(5px);
            position: relative;
            z-index: 2;
        }

        .bgm-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            background: rgba(30, 5, 10, 0.9);
            border: 2px solid #ff1e43;
            color: #fff;
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Mitr', sans-serif;
            font-size: 0.9rem;
            box-shadow: 0 0 15px rgba(255, 30, 67, 0.6);
            transition: all 0.3s ease;
        }

        .bgm-control:hover {
            transform: scale(1.08);
            box-shadow: 0 0 25px rgba(255, 30, 67, 1);
        }

        .navbar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: rgba(40, 10, 15, 0.8);
            color: #ff8093;
            border: 1px solid #ff1e43;
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-family: 'Mitr', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: #ff1e43;
            color: #ffffff;
            box-shadow: 0 0 12px rgba(255, 30, 67, 0.8);
            transform: translateY(-2px);
        }

        .nav-btn.active {
            background: linear-gradient(45deg, #b3001b, #ff1e43);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 30, 67, 0.8);
            font-weight: bold;
        }

        .top-widget-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(40, 10, 15, 0.7);
            border: 1px solid rgba(255, 30, 67, 0.4);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .widget-item {
            font-size: 0.95rem;
            color: #ff8093;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .widget-value {
            color: #ffffff;
            font-weight: bold;
        }

        h1 {
            font-family: 'Mitr', sans-serif;
            color: #ff2a4b;
            text-align: center;
            font-size: 2.3rem;
            text-shadow: 0 0 10px #ff002b, 0 0 20px #ff002b;
            letter-spacing: 2px;
            margin-bottom: 20px;
            min-height: 55px;
        }

        hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff1e43, transparent);
            margin: 25px 0;
        }

        .info-card {
            background: rgba(40, 10, 15, 0.6);
            border-left: 4px solid #ff1e43;
            padding: 15px 20px;
            margin: 15px 0;
            border-radius: 0 10px 10px 0;
            transition: all 0.3s ease;
        }

        .info-card:hover {
            transform: translateX(8px);
            box-shadow: 0 0 15px rgba(255, 30, 67, 0.4);
            background: rgba(60, 15, 22, 0.8);
        }

        h2 {
            font-size: 1.2rem;
            color: #ff8093;
            margin: 0 0 5px 0;
        }

        p {
            font-size: 1.1rem;
            color: #ffffff;
            margin: 0;
        }

        a.fb-link {
            color: #ff3355;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s, text-shadow 0.3s;
        }

        a.fb-link:hover {
            color: #ffffff;
            text-shadow: 0 0 10px #ff002b;
        }

        .image-gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .image-gallery img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 15px;
            border: 2px solid #ff1e43;
            box-shadow: 0 0 15px rgba(255, 0, 43, 0.4);
            transition: all 0.3s ease;
        }

        .image-gallery img:hover {
            transform: scale(1.1) rotate(3deg);
            box-shadow: 0 0 30px rgba(255, 0, 43, 0.9);
            border-color: #ffffff;
        }

        .video-container {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .video-container iframe {
            border-radius: 12px;
            border: 2px solid #ff1e43;
            box-shadow: 0 0 20px rgba(255, 30, 67, 0.4);
        }
    </style>
</head>
<body>

    <!-- 1. Cursor Light -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <canvas id="particle-canvas"></canvas>

    <button class="bgm-control" id="bgmBtn" onclick="toggleBGM()">🎵 BGM: ปิดอยู่</button>
    <audio id="bgmAudio" loop src="mysong.mp3.mp3"></audio>

    <div class="container">
        <div class="navbar">
            <a href="index.html" class="nav-btn active">หน้าแรก (แนะนำตัว)</a>
            <a href="page2.html" class="nav-btn">หน้า 2 (ทักษะและอาชีพ)</a>
            <a href="page3.html" class="nav-btn">หน้า 3 (ตารางกิจวัตรประจำวัน)</a>
        </div>

        <div class="top-widget-bar">
            <div class="widget-item">
                ⛅ เชียงใหม่: <span class="widget-value" id="weather">กำลังโหลด...</span>
            </div>
            <div class="widget-item">
                ⏰ เวลา: <span class="widget-value" id="clock">00:00:00</span>
            </div>
            <div class="widget-item">
                👀 เข้าชม: <span class="widget-value" id="visitor-count">1,245</span> คน
            </div>
        </div>

        <!-- 2. Typing Effect ตรงชื่อ -->
        <h1 id="typingName"></h1>
        
        <hr>

        <div class="info-card">
            <h2>วันเกิด</h2>
            <p>30/03/2553</p>
        </div>

        <div class="info-card">
            <h2>อายุ</h2>
            <p>16 ปี</p>
        </div>

        <div class="info-card">
            <h2>สถานศึกษาปัจจุบัน</h2>
            <p>วิทยาลัยเทคนิคเชียงใหม่</p>
        </div>

        <div class="info-card">
            <h2>สิ่งที่ชอบ</h2>
            <p>นอน / เกม / ดูยูทูป</p>
        </div>

        <div class="info-card">
            <h2>ลิงก์เฟสของฉัน</h2>
            <p>
                <a class="fb-link" href="https://www.facebook.com/pha.nu.wichy.suwrrn.ratn?locale=th_TH" target="_blank">
                    Facebook Profile ➔
                </a>
            </p>
        </div>

        <hr>

        <h2 style="text-align: center; color: #ff1e43; font-size: 1.5rem; text-shadow: 0 0 8px #ff002b;">
            รูปของฉัน
        </h2>
        <div class="image-gallery">
            <img src="018.jpg" alt="รูปของฉัน 1">
            <img src="67.jpg" alt="รูปของฉัน 2">
        </div>

        <hr>

        <div class="video-container">
            <iframe width="315" height="560" 
                    src="https://www.youtube.com/embed/Hs3SSMrR55k" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
            </iframe>
        </div>
    </div>

    <script>
        // 1. Cursor Effect Script
        const glow = document.getElementById('cursorGlow');
        window.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // 2. Typing Effect Script
        const text = "นายภานุวิชญ์ สุวรรณรัตน์";
        let index = 0;
        function typeWriter() {
            if (index < text.length) {
                document.getElementById("typingName").innerHTML += text.charAt(index);
                index++;
                setTimeout(typeWriter, 120);
            }
        }
        typeWriter();

        // Clock & Weather & Visitor
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH');
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=18.7904&longitude=98.9847&current_weather=true');
                const data = await res.json();
                document.getElementById('weather').innerText = `${Math.round(data.current_weather.temperature)}°C`;
            } catch (e) {
                document.getElementById('weather').innerText = '28°C';
            }
        }
        fetchWeather();

        let visits = localStorage.getItem('site_visits') || 100;
        visits++;
        localStorage.setItem('site_visits', visits);
        document.getElementById('visitor-count').innerText = visits;

        // BGM
        const bgmAudio = document.getElementById('bgmAudio');
        const bgmBtn = document.getElementById('bgmBtn');
        function toggleBGM() {
            if (bgmAudio.paused) {
                bgmAudio.play();
                bgmBtn.innerText = "🔊 BGM: เล่นอยู่";
                bgmBtn.style.background = "#ff1e43";
            } else {
                bgmAudio.pause();
                bgmBtn.innerText = "🎵 BGM: ปิดอยู่";
                bgmBtn.style.background = "rgba(30, 5, 10, 0.9)";
            }
        }

        // Particles
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        const particles = [];
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2 + 1,
                speedY: Math.random() * 1 + 0.5,
                speedX: Math.random() * 0.6 - 0.3,
                alpha: Math.random()
            });
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y += p.speedY;
                p.x += p.speedX;
                if (p.y > canvas.height) p.y = 0;
                if (p.x > canvas.width || p.x < 0) p.x = Math.random() * canvas.width;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 30, 67, ${p.alpha})`;
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#ff1e43";
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
    </script>
</body>
</html>
